<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>圓周魔王大戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto+Sans+TC', sans-serif;
            background: #020617;
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        .rpg-font { font-family: 'ZCOOL+KuaiLe', cursive; }
        .loading-overlay { background: rgba(2, 6, 23, 0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; position: absolute; inset: 0; }
        
        #game-ui { position: relative; z-index: 20; }
        #stage {
            position: relative;
            height: 160px;
            background: linear-gradient(to bottom, #1e293b 0%, #334155 100%);
            border-bottom: 8px solid #475569;
        }

        .entity { position: absolute; bottom: 10px; transition: all 0.3s cubic-bezier(0.17, 0.88, 0.32, 1.2); font-size: 60px; user-select: none; }
        #player-sprite { left: 30px; z-index: 30; }
        #monster-sprite { right: 30px; z-index: 30; }

        .projectile { position: absolute; pointer-events: none; z-index: 40; transition: transform 0.4s linear, opacity 0.2s; }
        .proj-mage { width: 30px; height: 30px; border-radius: 50%; background: radial-gradient(circle, #fff, #3b82f6); box-shadow: 0 0 15px #3b82f6; }
        .proj-warrior { width: 45px; height: 8px; border-radius: 4px; background: #fbbf24; box-shadow: 0 0 10px #f59e0b; }
        .proj-archer { width: 35px; height: 3px; background: #e2e8f0; box-shadow: 0 0 5px #fff; }

        .job-card { cursor: pointer; transition: all 0.2s; border: 2px solid #334155; background: rgba(30, 41, 59, 0.8); position: relative; }
        .job-card.selected { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); transform: scale(1.02); }
        .confirm-tag { display: none; position: absolute; right: 10px; top: 10px; background: #3b82f6; padding: 2px 8px; border-radius: 10px; font-size: 10px; animation: pulse 1s infinite; }
        .job-card.selected .confirm-tag { display: block; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .stat-badge { background: #1e293b; border: 1px solid #475569; padding: 2px 6px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        
        @keyframes float-up { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-60px); opacity: 0; } }
        .growth-text { position: absolute; font-weight: bold; color: #4ade80; animation: float-up 1.2s forwards; pointer-events: none; z-index: 100; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        .question-highlight { background: #0f172a; border: 2px solid #3b82f6; box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.2); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

    <div id="game-ui" class="w-full max-w-md bg-slate-900 rounded-[2.5rem] overflow-hidden shadow-2xl relative mx-2 border-4 border-slate-800 h-[750px] flex flex-col">
        
        <!-- Loading Layer -->
        <div id="loading-layer" class="loading-overlay hidden">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-green-500 mb-4"></div>
            <p id="loading-text" class="text-green-400 font-bold italic animate-pulse">正在讀取 Google 表格...</p>
        </div>

        <!-- 登入畫面 -->
        <div id="login-screen" class="flex-1 flex flex-col p-8 justify-center">
            <div class="text-center mb-10">
                <h1 class="text-4xl rpg-font text-green-400 mb-2">冒險者協會</h1>
                <p class="text-slate-500 text-xs tracking-[0.2em]">連動 Google Sheets 資料庫</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-2">學生 ID (帳號)</label>
                    <input type="text" id="login-id" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl p-4 text-green-300 outline-none focus:border-green-500 transition-all" placeholder="例: S12345">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-2">密碼</label>
                    <input type="password" id="login-pw" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl p-4 text-green-300 outline-none focus:border-green-500 transition-all" placeholder="******">
                </div>
                <div id="name-field">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-2">學生姓名</label>
                    <input type="text" id="login-name" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl p-4 text-green-300 outline-none focus:border-green-500 transition-all" placeholder="新玩家請填寫姓名">
                </div>
                <button onclick="handleLogin()" class="w-full bg-green-600 hover:bg-green-500 p-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all mt-4">
                    進入異世界 🚪
                </button>
            </div>
            <p id="login-error" class="text-red-500 text-center text-xs mt-4 font-bold h-4"></p>
        </div>

        <!-- 遊戲主介面 -->
        <div id="main-game" class="hidden flex-1 flex flex-col">
            <div id="growth-container" class="absolute inset-0 pointer-events-none"></div>

            <!-- 頂部狀態欄 -->
            <div class="p-4 bg-slate-950 border-b border-slate-800">
                <div class="flex justify-between items-center mb-3">
                    <div class="flex flex-col">
                        <div class="flex items-center gap-2">
                            <span id="p-name-disp" class="text-sm font-bold text-white">---</span>
                            <span id="job-title" class="text-[10px] font-bold text-blue-400 uppercase italic">冒險者</span>
                        </div>
                        <span class="text-xl font-black italic text-yellow-500">LV.<span id="p-lv-disp">1</span></span>
                    </div>
                    <div id="stats-panel" class="flex gap-1">
                        <div class="stat-badge text-red-400">ATK <span id="s-atk">10</span></div>
                        <div class="stat-badge text-blue-400">INT <span id="s-int">10</span></div>
                        <div class="stat-badge text-yellow-400">DEF <span id="s-def">5</span></div>
                    </div>
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <div class="flex justify-between text-[10px] mb-1 font-bold text-slate-400"><span>HP 生命</span><span id="hp-text">100/100</span></div>
                        <div class="h-2 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                            <div id="p-hp-bar" class="h-full bg-gradient-to-r from-red-500 to-rose-400 transition-all duration-300" style="width: 100%"></div>
                        </div>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between text-[10px] mb-1 font-bold text-slate-400"><span>MP 魔力</span><span id="mp-text">50/50</span></div>
                        <div class="h-2 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                            <div id="p-mp-bar" class="h-full bg-gradient-to-r from-blue-500 to-indigo-400 transition-all duration-300" style="width: 100%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 戰鬥舞台 -->
            <div id="stage">
                <div id="player-sprite" class="entity">👤</div>
                <div id="monster-sprite" class="entity">👾</div>
                <div class="absolute top-2 right-4 text-right">
                    <p id="m-name-disp" class="text-[10px] font-bold text-red-400 uppercase mb-1">怪物</p>
                    <div class="w-32 h-2 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                        <div id="m-hp-bar" class="h-full bg-red-500 transition-all duration-300" style="width: 100%"></div>
                    </div>
                </div>
            </div>

            <div class="p-5 flex-1 overflow-y-auto">
                <!-- 職業選擇 -->
                <div id="job-menu" class="hidden space-y-4">
                    <div class="text-center mb-4">
                        <h2 class="text-xl rpg-font text-blue-300">首度啟程：選擇你的職業</h2>
                    </div>
                    <div class="grid gap-3">
                        <div onclick="selectJob('warrior')" id="card-warrior" class="job-card p-4 rounded-2xl flex items-center gap-4">
                            <span class="text-3xl">🤺</span>
                            <div class="flex-1">
                                <b class="text-yellow-500 text-sm">傳說戰士</b>
                                <p class="text-[9px] text-slate-400">高HP/ATK/DEF 成長率</p>
                            </div>
                            <div class="confirm-tag">確認</div>
                        </div>
                        <div onclick="selectJob('mage')" id="card-mage" class="job-card p-4 rounded-2xl flex items-center gap-4">
                            <span class="text-3xl">🧙</span>
                            <div class="flex-1">
                                <b class="text-blue-400 text-sm">大魔法師</b>
                                <p class="text-[9px] text-slate-400">最高INT/MP 成長率</p>
                            </div>
                            <div class="confirm-tag">確認</div>
                        </div>
                        <div onclick="selectJob('archer')" id="card-archer" class="job-card p-4 rounded-2xl flex items-center gap-4">
                            <span class="text-3xl">🏹</span>
                            <div class="flex-1">
                                <b class="text-green-400 text-sm">神射手</b>
                                <p class="text-[9px] text-slate-400">各項屬性均衡發展</p>
                            </div>
                            <div class="confirm-tag">確認</div>
                        </div>
                    </div>
                </div>

                <!-- 戰鬥操作 -->
                <div id="battle-controls" class="hidden space-y-4">
                    <div class="question-highlight p-6 rounded-3xl text-center border-2 border-blue-900">
                        <div id="q-box" class="text-2xl font-bold text-white leading-relaxed"></div>
                    </div>
                    <input type="number" id="ans-input" inputmode="decimal" placeholder="答案" 
                        class="w-full bg-black border-2 border-slate-700 rounded-2xl p-4 text-center text-5xl font-black text-blue-400 focus:border-blue-500 outline-none">
                    <button id="atk-btn" onclick="checkAnswer()" class="w-full bg-gradient-to-b from-blue-500 to-blue-700 p-5 rounded-2xl font-black text-2xl text-white shadow-[0_4px_0_rgb(29,78,216)] active:translate-y-1 active:shadow-none transition-all">
                        發動攻擊 💥
                    </button>
                    <p id="feedback" class="text-center h-4 text-xs font-bold uppercase"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 遊戲狀態
        let state = {
            id: null,
            pw: null,
            name: null,
            job: null,
            lv: 1,
            stats: { hp: 100, maxHp: 100, mp: 50, maxMp: 50, atk: 10, def: 5, int: 10 },
            pi: 3,
            ans: 0,
            mHP: 100,
            mMaxHP: 100
        };

        const jobConfig = {
            warrior: { name: '戰士', icon: '🤺', growth: { maxHp: 0.7, maxMp: 0.3, atk: 0.7, def: 0.7, int: 0.3 }, mainStat: 'atk' },
            mage: { name: '魔法師', icon: '🧙', growth: { maxHp: 0.3, maxMp: 0.7, atk: 0.5, def: 0.3, int: 0.9 }, mainStat: 'int' },
            archer: { name: '神射手', icon: '🏹', growth: { maxHp: 0.5, maxMp: 0.5, atk: 0.7, def: 0.5, int: 0.7 }, mainStat: 'atk' }
        };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function sfx(f, d, t='sine', v=0.1) {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        // --- 修改後的 Google Sheets 通訊邏輯 ---

        function handleLogin() {
            const id = document.getElementById('login-id').value.trim();
            const pw = document.getElementById('login-pw').value.trim();
            const name = document.getElementById('login-name').value.trim();
            const err = document.getElementById('login-error');

            if (!id || !pw) {
                err.innerText = "請輸入帳號與密碼";
                return;
            }

            setLoading(true, "連線至 Google Sheets...");
            
            // 檢查是否在 Google Apps Script 環境
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                google.script.run
                    .withSuccessHandler((result) => {
                        setLoading(false);
                        if (result.success) {
                            if (result.data.pw !== pw) {
                                err.innerText = "密碼錯誤！";
                                return;
                            }
                            // 載入舊玩家數據
                            state.id = id;
                            state.pw = pw;
                            state.name = result.data.name;
                            state.job = result.data.job;
                            state.lv = result.data.lv;
                            state.stats = result.data.stats;
                            startExistingGame();
                        } else {
                            // 新玩家判斷
                            if (!name) {
                                err.innerText = "新冒險者請填寫姓名";
                                return;
                            }
                            state.id = id;
                            state.pw = pw;
                            state.name = name;
                            showJobSelection();
                        }
                    })
                    .withFailureHandler((e) => {
                        setLoading(false);
                        err.innerText = "連線失敗：" + e.message;
                    })
                    .doLogin(id); // 呼叫 GAS 後端的 doLogin 函數
            } else {
                // 本地開發模擬模式
                setLoading(false);
                console.warn("偵測到本地環境，模擬登入流程");
                state.id = id;
                state.pw = pw;
                state.name = name || "測試玩家";
                showJobSelection();
            }
        }

        function saveToGoogleSheets() {
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                const payload = {
                    id: state.id,
                    pw: state.pw,
                    name: state.name,
                    job: state.job,
                    lv: state.lv,
                    stats: state.stats
                };
                
                google.script.run
                    .withSuccessHandler(() => console.log("雲端同步成功"))
                    .doSave(payload); // 呼叫 GAS 後端的 doSave 函數
            } else {
                console.log("模擬存檔：", state);
            }
        }

        // --- 遊戲介面邏輯 (保持不變) ---

        function setLoading(show, text = "") {
            const layer = document.getElementById('loading-layer');
            const textEl = document.getElementById('loading-text');
            if(textEl) textEl.innerText = text;
            if(show) layer.classList.remove('hidden');
            else layer.classList.add('hidden');
        }

        function showJobSelection() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-game').classList.remove('hidden');
            document.getElementById('job-menu').classList.remove('hidden');
            document.getElementById('p-name-disp').innerText = state.name;
        }

        window.selectJob = async (jobId) => {
            const card = document.getElementById(`card-${jobId}`);
            if (!card.classList.contains('selected')) {
                document.querySelectorAll('.job-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                sfx(400, 0.1);
                return;
            }

            state.job = jobId;
            if(jobId === 'warrior') state.stats = { maxHp: 150, hp: 150, maxMp: 40, mp: 40, atk: 15, def: 10, int: 5 };
            if(jobId === 'mage') state.stats = { maxHp: 80, hp: 80, maxMp: 120, mp: 120, atk: 5, def: 3, int: 20 };
            if(jobId === 'archer') state.stats = { maxHp: 110, hp: 110, maxMp: 70, mp: 70, atk: 12, def: 6, int: 12 };

            setLoading(true, "建立角色檔案...");
            saveToGoogleSheets();
            setTimeout(() => {
                startExistingGame();
                setLoading(false);
            }, 1000);
        };

        function startExistingGame() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-game').classList.remove('hidden');
            document.getElementById('job-menu').classList.add('hidden');
            document.getElementById('battle-controls').classList.remove('hidden');
            
            document.getElementById('p-name-disp').innerText = state.name;
            document.getElementById('job-title').innerText = jobConfig[state.job].name;
            document.getElementById('player-sprite').innerText = jobConfig[state.job].icon;
            
            updateUI();
            nextMonster();
        }

        function nextMonster() {
            state.mMaxHP = 70 + (state.lv * 35);
            state.mHP = state.mMaxHP;
            const emoji = ["👾", "👹", "🐉", "👻", "🤖", "🦁", "🦇"];
            document.getElementById('monster-sprite').innerText = emoji[Math.floor(Math.random()*emoji.length)];
            document.getElementById('m-name-disp').innerText = `LV.${state.lv} 守衛`;
            updateUI();
            generateQuestion();
        }

        function generateQuestion() {
            const inp = document.getElementById('ans-input');
            inp.value = ''; inp.focus();
            const nums = [5, 10, 15, 20, 4, 8, 25, 12, 30];
            let v = nums[Math.floor(Math.random()*nums.length)];
            let isC = Math.random() > 0.5;
            
            if(isC) {
                state.ans = v * state.pi;
                document.getElementById('q-box').innerHTML = `直徑為 <span class="text-blue-400">${v}</span><br>求 <span class="text-yellow-400 underline underline-offset-4">圓周</span>？ (π=3)`;
            } else {
                state.ans = v;
                document.getElementById('q-box').innerHTML = `圓周為 <span class="text-yellow-400">${v * state.pi}</span><br>求 <span class="text-blue-400 underline underline-offset-4">直徑</span>？ (π=3)`;
            }
        }

        window.checkAnswer = async () => {
            const val = parseFloat(document.getElementById('ans-input').value);
            if(isNaN(val)) return;

            if(Math.abs(val - state.ans) < 0.1) {
                await executeAttack();
            } else {
                const rawDmg = 15 + (state.lv * 3);
                const actualDmg = Math.max(5, rawDmg - state.stats.def);
                state.stats.hp -= actualDmg;
                sfx(100, 0.4, 'sawtooth');
                document.getElementById('feedback').innerText = `回答錯誤！失去 ${actualDmg} HP`;
                document.getElementById('feedback').style.color = "#ef4444";
                updateUI();
                if(state.stats.hp <= 0) {
                    alert("體力耗盡！稍後恢復後再戰。");
                    location.reload();
                } else generateQuestion();
            }
        };

        async function executeAttack() {
            const btn = document.getElementById('atk-btn');
            btn.disabled = true;
            document.getElementById('feedback').innerText = "計算正確！發動連擊！";
            document.getElementById('feedback').style.color = "#4ade80";

            const mainStatVal = state.stats[jobConfig[state.job].mainStat];
            const dmgPerHit = mainStatVal * 3;
            const hitCount = Math.min(5, Math.floor(state.lv / 4) + 1);

            for(let i=0; i<hitCount; i++) {
                if(state.job === 'warrior') {
                    const p = document.getElementById('player-sprite');
                    p.style.transform = 'translateX(180px) rotate(15deg)';
                    setTimeout(() => p.style.transform = 'translateX(0)', 150);
                } else {
                    const proj = document.createElement('div');
                    proj.className = `projectile proj-${state.job}`;
                    proj.style.left = '80px'; proj.style.bottom = '55px';
                    document.getElementById('stage').appendChild(proj);
                    requestAnimationFrame(() => {
                        proj.style.transform = `translateX(250px)`;
                        setTimeout(() => proj.remove(), 250);
                    });
                }
                sfx(440, 0.15);
                state.mHP -= dmgPerHit;
                updateUI();
                if(state.mHP <= 0) break;
                await new Promise(r => setTimeout(r, 250));
            }

            btn.disabled = false;
            if(state.mHP <= 0) {
                await processGrowthAndSave();
            } else {
                generateQuestion();
            }
        }

        async function processGrowthAndSave() {
            const growth = jobConfig[state.job].growth;
            let logs = [];
            
            if(Math.random() < growth.maxHp) { state.stats.maxHp += 10; state.stats.hp = Math.min(state.stats.maxHp, state.stats.hp + 20); logs.push("HP+"); }
            if(Math.random() < growth.maxMp) { state.stats.maxMp += 8; state.stats.mp = Math.min(state.stats.maxMp, state.stats.mp + 15); logs.push("MP+"); }
            if(Math.random() < growth.atk) { state.stats.atk += 2; logs.push("ATK+"); }
            if(Math.random() < growth.def) { state.stats.def += 1; logs.push("DEF+"); }
            if(Math.random() < growth.int) { state.stats.int += 2; logs.push("INT+"); }

            logs.forEach((txt, i) => {
                const el = document.createElement('div');
                el.className = "growth-text";
                el.innerText = txt;
                el.style.left = (40 + i*35) + 'px';
                el.style.top = '100px';
                document.getElementById('growth-container').appendChild(el);
                setTimeout(() => el.remove(), 1200);
            });

            state.lv++;
            sfx(523, 0.1); setTimeout(()=>sfx(783, 0.2), 150);

            // 自動保存到 Google Sheets
            saveToGoogleSheets();
            setTimeout(nextMonster, 1300);
        }

        function updateUI() {
            document.getElementById('p-lv-disp').innerText = state.lv;
            document.getElementById('s-atk').innerText = state.stats.atk;
            document.getElementById('s-int').innerText = state.stats.int;
            document.getElementById('s-def').innerText = state.stats.def;
            document.getElementById('hp-text').innerText = `${Math.ceil(state.stats.hp)}/${state.stats.maxHp}`;
            document.getElementById('mp-text').innerText = `${Math.ceil(state.stats.mp)}/${state.stats.maxMp}`;
            document.getElementById('p-hp-bar').style.width = (state.stats.hp / state.stats.maxHp * 100) + '%';
            document.getElementById('p-mp-bar').style.width = (state.stats.mp / state.stats.maxMp * 100) + '%';
            document.getElementById('m-hp-bar').style.width = Math.max(0, state.mHP / state.mMaxHP * 100) + '%';
        }

        document.getElementById('ans-input').addEventListener('keypress', e => e.key === 'Enter' && window.checkAnswer());
    </script>
</body>
</html>
