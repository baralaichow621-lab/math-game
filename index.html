<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學遊戲 - 學生系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #sidebar { transition: transform 0.3s ease-in-out; }
        .hidden { display: none; }
        /* 簡單的加載動畫 */
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <nav class="bg-blue-600 text-white p-4 flex items-center shadow-md sticky top-0 z-30">
        <button id="menuBtn" class="p-2 focus:outline-none hover:bg-blue-700 rounded-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>
        <h1 class="flex-1 text-center text-xl font-bold pr-10">數學大冒險</h1>
    </nav>

    <main class="flex-1 p-6 flex flex-col items-center justify-center">
        
        <div id="loginSection" class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">學生登入</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">學號 (ID)</label>
                    <input type="text" id="stuID" class="mt-1 block w-full p-3 border rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">密碼 (PW)</label>
                    <input type="password" id="stuPW" class="mt-1 block w-full p-3 border rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button id="loginSubmit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition">
                    登入系統
                </button>
                <p id="errorMsg" class="text-red-500 text-sm text-center hidden">登入失敗，請檢查帳號密碼</p>
            </div>
        </div>

        <div id="loadingSection" class="hidden text-center">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4 mx-auto"></div>
            <p class="text-gray-600">正在連線至雲端書齋...</p>
        </div>

        <div id="profileSection" class="hidden bg-white p-6 rounded-xl shadow-lg w-full max-w-md">
            <div class="flex items-center space-x-4 mb-6">
                <div class="bg-blue-100 p-4 rounded-full text-3xl" id="displayIcon">🛡️</div>
                <div>
                    <h2 class="text-2xl font-bold text-gray-800" id="displayName">學生姓名</h2>
                    <p class="text-blue-600 font-bold">LV. <span id="displayLV">1</span> <span id="displayRole" class="text-sm bg-blue-100 px-2 py-1 rounded ml-2">角色稱號</span></p>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 border-t pt-4 text-center">
                <div class="bg-orange-50 p-3 rounded-lg">
                    <p class="text-xs text-orange-600 uppercase font-bold">攻擊力</p>
                    <p class="text-xl font-bold text-orange-800" id="attrATK">0</p>
                </div>
                <div class="bg-green-50 p-3 rounded-lg">
                    <p class="text-xs text-green-600 uppercase font-bold">防禦力</p>
                    <p class="text-xl font-bold text-green-800" id="attrDEF">0</p>
                </div>
            </div>
            
            <button onclick="location.reload()" class="w-full mt-6 text-sm text-gray-400 hover:text-gray-600 underline">登出系統</button>
        </div>

    </main>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white shadow-2xl transform -translate-x-full z-50">
        <div class="p-6">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-bold text-gray-800">遊戲目錄</h2>
                <button id="closeBtn" class="text-gray-500 hover:text-black">✕</button>
            </div>
            <ul class="space-y-4">
                <li><a href="index.html" class="block p-3 bg-blue-50 rounded-lg">🏠 回首頁 (登入)</a></li>
                <li><a href="ten.html" class="block p-3 hover:bg-gray-100 rounded-lg">🎮 合十遊戲</a></li>
                <li><a href="circle2.html" class="block p-3 hover:bg-gray-100 rounded-lg">🧠 圓周魔王大戰</a></li>
            </ul>
        </div>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black opacity-0 pointer-events-none transition-opacity duration-300 z-40"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxi8Qk9rgDRqjrEnwJrtZhhXDUiSsHm3Ndqy2u6IKV6FJLuPBVat0Z6em-psKH8hIi_NA/exec"; // 這裡放入你的 GAS URL

        // 控制介面切換
        function showSection(id) {
            ['loginSection', 'loadingSection', 'profileSection'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        // 登入邏輯
        document.getElementById('loginSubmit').addEventListener('click', async () => {
            const id = document.getElementById('stuID').value;
            const pw = document.getElementById('stuPW').value;
            
            if(!id || !pw) return alert("請輸入帳號密碼");

            showSection('loadingSection');

            try {
                // 發送請求到 Google Sheets (GAS)
                const response = await fetch(`${API_URL}?id=${id}&pw=${pw}`);
                const data = await response.json();

                if (data.status === "success") {
                    // 登入成功，填入資料
                    document.getElementById('displayName').innerText = data.name;
                    document.getElementById('displayLV').innerText = data.lv;
                    document.getElementById('displayRole').innerText = data.role;
                    document.getElementById('attrATK').innerText = data.atk;
                    document.getElementById('attrDEF').innerText = data.def;
                    
                    showSection('profileSection');
                } else {
                    showSection('loginSection');
                    document.getElementById('errorMsg').classList.remove('hidden');
                }
            } catch (error) {
                console.error(error);
                alert("連線失敗，請檢查 GAS 設定");
                showSection('loginSection');
            }
        });

        // 目錄控制
        const menuBtn = document.getElementById('menuBtn');
        const closeBtn = document.getElementById('closeBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function toggleMenu() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('opacity-50');
            overlay.classList.toggle('pointer-events-none');
        }

        menuBtn.addEventListener('click', toggleMenu);
        closeBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);
    </script>
</body>
</html>
