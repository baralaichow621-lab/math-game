<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>合十挑戰 - 學生登入版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #fff7ed; font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: linear-gradient(to bottom, #fff7ed, #ffedd5); }
        .bubble { 
            position: absolute; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; font-weight: bold; cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.15); 
            user-select: none; border: 3px solid rgba(255,255,255,0.4);
            transition: transform 0.1s active;
        }
        .bubble:active { transform: scale(0.9); }
        .modal { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
            text-align: center; z-index: 100; width: 90%; max-width: 400px;
        }
        input { border: 2px solid #fed7aa; padding: 12px; border-radius: 15px; width: 100%; margin-bottom: 12px; text-align: center; font-size: 1rem; }
        input:focus { outline: none; border-color: #f97316; }
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #f97316; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 飄浮裝飾背景 */
        .bg-deco { position: absolute; color: rgba(249, 115, 22, 0.05); font-size: 5rem; font-weight: bold; z-index: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 裝飾背景 -->
    <div class="bg-deco" style="top:10%; left:10%;">10</div>
    <div class="bg-deco" style="top:60%; right:15%;">+</div>
    <div class="bg-deco" style="bottom:10%; left:20%;">5+5</div>

    <!-- 登入畫面 -->
    <div id="login-screen" class="absolute inset-0 bg-orange-500 flex flex-col items-center justify-center text-white z-[300] p-6 text-center">
        <div class="mb-8">
            <h1 class="text-5xl font-black mb-2 italic">合十冒險王</h1>
            <p class="opacity-80">MATH ADVENTURE</p>
        </div>
        
        <div class="bg-white p-8 rounded-[40px] shadow-2xl w-full max-w-xs text-gray-800">
            <p class="mb-4 text-sm text-orange-600 font-bold uppercase tracking-widest">Student Login</p>
            <input type="text" id="stu-id" placeholder="學生帳號 (ID)" autocomplete="off">
            <input type="password" id="stu-pass" placeholder="密碼" autocomplete="off">
            <button id="login-btn" class="bg-orange-500 hover:bg-orange-600 text-white px-10 py-4 rounded-2xl text-xl font-bold shadow-lg w-full active:scale-95 transition-all mt-2">
                登入遊戲
            </button>
            <div id="login-loading" class="mt-4 hidden text-orange-500 font-medium">
                <div class="loading-spinner mr-2"></div> 驗證中...
            </div>
        </div>
        <p class="mt-8 text-xs opacity-60">數據將同步至 Google Sheets 試算表</p>
    </div>

    <!-- 遊戲 UI -->
    <div id="ui-layer" class="absolute top-6 left-0 right-0 px-6 pointer-events-none z-10 flex flex-col items-center">
        <div class="bg-white/90 backdrop-blur px-6 py-2 rounded-full shadow-sm font-bold text-orange-600 mb-3 border border-orange-100">
            👤 <span id="player-name-ui">---</span> | 🏆 最高: <span id="player-best-ui">0</span>
        </div>
        <div class="bg-orange-500 text-white px-10 py-2 rounded-2xl text-2xl font-black shadow-xl border-b-4 border-orange-700">
            得分: <span id="score-display">0</span>
        </div>
    </div>

    <!-- 結算畫面 -->
    <div id="message-box" class="modal" style="display: none;">
        <div class="text-5xl mb-4">⏰</div>
        <h2 class="text-3xl font-black mb-2 text-orange-600">時間到！</h2>
        <p class="text-gray-500 mb-1">本次挑戰得分</p>
        <p class="text-6xl font-black mb-8 text-orange-500" id="final-score">0</p>
        
        <div id="sync-status" class="bg-gray-50 py-3 px-4 rounded-xl text-sm text-gray-500 mb-6 flex items-center justify-center">
            正在同步分數...
        </div>
        
        <button id="restart-btn" class="bg-orange-500 hover:bg-orange-600 text-white px-8 py-4 rounded-2xl font-bold text-xl w-full shadow-lg active:scale-95 transition-all">
            再玩一次
        </button>
    </div>
</div>

<script>
    // --- 重要：在此貼上你的 Google Apps Script 網址 ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxRYrYmNiYN-fnhjkXxvYeLXiYh9mre-8U9Vn65rSCqg1qFzCsvT91F0JdiOOXqIexg8w/exec";

    let studentData = { id: "", name: "", highScore: 0 };
    let score = 0;
    let gameActive = false;
    let gameTimer = null;

    // 處理登入
    document.getElementById('login-btn').onclick = async () => {
        const id = document.getElementById('stu-id').value.trim();
        const password = document.getElementById('stu-pass').value.trim();
        if (!id || !password) return alert("請輸入帳號和密碼");

        const loading = document.getElementById('login-loading');
        loading.classList.remove('hidden');
        
        try {
            // 使用 no-cors 模式在某些預覽環境下會失敗，正常網頁環境則 OK
            const resp = await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "cors", 
                body: JSON.stringify({ action: "login", id: id, password: password })
            });
            const result = await resp.json();

            if (result.success) {
                studentData = { id: id, name: result.name, highScore: result.highScore };
                document.getElementById('player-name-ui').innerText = studentData.name;
                document.getElementById('player-best-ui').innerText = studentData.highScore;
                document.getElementById('login-screen').style.transition = "opacity 0.5s";
                document.getElementById('login-screen').style.opacity = "0";
                setTimeout(() => { document.getElementById('login-screen').style.display = 'none'; }, 500);
            } else {
                alert("錯誤: " + result.message);
            }
        } catch (e) {
            console.error(e);
            alert("連線失敗！\n1. 請確保 Google Script 已發佈為「所有人」\n2. 若在預覽中，請嘗試存為 HTML 檔後直接開啟測試。");
        } finally {
            loading.classList.add('hidden');
        }
    };

    // 遊戲邏輯
    function startGame() {
        if (gameActive) return;
        score = 0; 
        gameActive = true;
        document.getElementById('score-display').innerText = "0";
        document.getElementById('message-box').style.display = 'none';
        
        // 遊戲長度：15 秒
        gameTimer = setTimeout(endGame, 15000);
        
        const spawn = setInterval(() => {
            if(gameActive) createBubble(); else clearInterval(spawn);
        }, 700);
    }

    function createBubble() {
        const b = document.createElement('div');
        b.className = 'bubble';
        const n1 = Math.floor(Math.random() * 11);
        const isCorrect = Math.random() > 0.3; // 70% 機率出現正確答案
        let n2 = isCorrect ? (10 - n1) : Math.floor(Math.random() * 11);
        
        // 確保錯誤答案真的不是 10
        if (!isCorrect && n1 + n2 === 10) n2 = (n2 + 1) % 11;

        b.innerHTML = `<span class="text-xs opacity-80 mb-1">?</span><span class="text-2xl">${n1} + ${n2}</span>`;
        
        const size = 90;
        const colors = ['#f97316', '#fb923c', '#ea580c', '#f59e0b'];
        b.style.cssText = `
            width:${size}px; height:${size}px; 
            background:${colors[Math.floor(Math.random()*colors.length)]};
            left:${Math.random()*75}vw; top:100vh;
        `;
        document.getElementById('game-container').appendChild(b);
        
        let pos = 100;
        const speed = 0.3 + (score / 200); // 隨分數增加速度
        const move = setInterval(() => {
            pos -= speed; 
            b.style.top = pos + "vh";
            if(pos < -15 || !gameActive) { b.remove(); clearInterval(move); }
        }, 16);

        const onHit = (e) => {
            e.stopPropagation();
            if (!gameActive) return;
            if (n1 + n2 === 10) {
                score += 10;
                b.style.transform = "scale(1.5)";
                b.style.opacity = "0";
            } else {
                score = Math.max(0, score - 5);
                b.style.background = "#6b7280";
            }
            document.getElementById('score-display').innerText = score;
            setTimeout(() => { b.remove(); clearInterval(move); }, 100);
        };

        b.onclick = onHit;
        b.ontouchstart = onHit;
    }

    async function endGame() {
        gameActive = false;
        clearTimeout(gameTimer);
        document.getElementById('final-score').innerText = score;
        document.getElementById('message-box').style.display = 'block';
        document.getElementById('sync-status').innerHTML = '<div class="loading-spinner w-4 h-4 mr-2"></div> 正在同步分數...';

        try {
            const resp = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "updateScore", id: studentData.id, score: score })
            });
            const res = await resp.json();
            if(res.success) {
                document.getElementById('sync-status').innerText = "✅ 分數已更新至雲端試算表";
                if(score > studentData.highScore) {
                    studentData.highScore = score;
                    document.getElementById('player-best-ui').innerText = score;
                }
            }
        } catch (e) {
            document.getElementById('sync-status').innerText = "❌ 同步失敗 (請檢查網路)";
        }
    }

    document.getElementById('restart-btn').onclick = startGame;
    
    // 防止點擊 UI 觸發遊戲開始
    document.getElementById('login-screen').onclick = (e) => e.stopPropagation();
    document.getElementById('message-box').onclick = (e) => e.stopPropagation();
</script>
</body>
</html>
