<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學大冒險 - 勇者系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #sidebar { transition: transform 0.3s ease-in-out; }
        .hidden { display: none; }
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-sans">

    <nav class="bg-blue-600 text-white p-4 flex items-center shadow-md sticky top-0 z-30">
        <button id="menuBtn" class="p-2 hover:bg-blue-700 rounded-lg transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <h1 class="flex-1 text-center text-xl font-bold pr-10">數學大冒險</h1>
    </nav>

    <main class="flex-1 p-6 flex flex-col items-center justify-center">
        
        <div id="loginSection" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-gray-100">
            <h2 class="text-2xl font-black mb-6 text-center text-gray-800">勇者登入</h2>
            <div class="space-y-4">
                <input type="text" id="stuID" placeholder="請輸入學號 (ID)" class="w-full p-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none transition">
                <input type="password" id="stuPW" placeholder="請輸入密碼 (PW)" class="w-full p-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none transition">
                <button id="loginSubmit" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg active:scale-95 transition">開始冒險</button>
                <p id="errorMsg" class="text-red-500 text-sm text-center font-medium hidden">❌ 帳號或密碼錯誤</p>
            </div>
        </div>

        <div id="loadingSection" class="hidden text-center">
            <div class="loader ease-linear rounded-full border-4 border-gray-200 h-14 w-14 mb-4 mx-auto"></div>
            <p class="text-gray-500 font-medium">正在連線至世界伺服器...</p>
        </div>

        <div id="profileSection" class="hidden bg-white p-6 rounded-2xl shadow-xl w-full max-w-md border-t-8 border-blue-500">
            <div class="flex items-center space-x-4 mb-8">
                <div class="bg-blue-50 w-20 h-20 rounded-2xl flex items-center justify-center text-4xl shadow-inner" id="displayIcon">🛡️</div>
                <div>
                    <h2 class="text-2xl font-black text-gray-800" id="displayName">---</h2>
                    <div class="flex items-center mt-1">
                        <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded-md font-bold">LV. <span id="displayLV">1</span></span>
                        <span id="displayJob" class="ml-2 text-gray-500 font-bold text-sm">初級勇者</span>
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-red-50 p-4 rounded-2xl border border-red-100 text-center">
                    <p class="text-xs text-red-400 font-black uppercase tracking-wider">攻擊力 (ATK)</p>
                    <p class="text-3xl font-black text-red-600" id="attrATK">0</p>
                </div>
                <div class="bg-green-50 p-4 rounded-2xl border border-green-100 text-center">
                    <p class="text-xs text-green-400 font-black uppercase tracking-wider">防禦力 (DEF)</p>
                    <p class="text-3xl font-black text-green-600" id="attrDEF">0</p>
                </div>
            </div>
            
            <button onclick="location.reload()" class="w-full py-2 text-gray-400 text-sm font-medium hover:text-gray-600 transition">登出冒險者帳號</button>
        </div>
    </main>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white shadow-2xl transform -translate-x-full z-50">
        <div class="p-6">
            <h2 class="text-xl font-black text-gray-800 mb-8 border-b pb-4">冒險清單</h2>
            <ul class="space-y-3">
                <li><a href="#" class="block p-4 bg-blue-50 text-blue-700 rounded-xl font-bold italic">🏠 勇者大廳</a></li>
                <li><a href="#" class="block p-4 hover:bg-gray-50 text-gray-600 rounded-xl font-bold transition">🎮 合十挑戰</a></li>
            </ul>
        </div>
    </div>
    <div id="overlay" class="fixed inset-0 bg-black opacity-0 pointer-events-none transition-opacity duration-300 z-40"></div>

    <script>
        // ！！！請替換成你的 GAS 部署網址 ！！！
        const API_URL = "https://script.google.com/macros/s/AKfycbxi8Qk9rgDRqjrEnwJrtZhhXDUiSsHm3Ndqy2u6IKV6FJLuPBVat0Z6em-psKH8hIi_NA/exec"; 

        function showSection(id) {
            ['loginSection', 'loadingSection', 'profileSection'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        document.getElementById('loginSubmit').addEventListener('click', async () => {
            const id = document.getElementById('stuID').value.trim();
            const pw = document.getElementById('stuPW').value.trim();
            
            if(!id || !pw) return alert("請輸入學號與密碼！");

            showSection('loadingSection');
            document.getElementById('errorMsg').classList.add('hidden');

            try {
                // 統一發送 POST 請求
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: 'login', 
                        id: id,
                        pw: pw 
                    })
                });

                const res = await response.json();

                if (res.success) {
                    const userData = res.data;
                    
                    // 渲染介面資料
                    document.getElementById('displayName').innerText = userData.name;
                    document.getElementById('displayLV').innerText = userData.lv;
                    document.getElementById('displayJob').innerText = userData.job || "初級勇者";
                    
                    // 處理數值
                    const stats = userData.stats || { atk: 0, def: 0 };
                    document.getElementById('attrATK').innerText = stats.atk;
                    document.getElementById('attrDEF').innerText = stats.def;
                    
                    showSection('profileSection');
                } else {
                    showSection('loginSection');
                    const errorElement = document.getElementById('errorMsg');
                    errorElement.innerText = "❌ " + (res.msg || "登入失敗");
                    errorElement.classList.remove('hidden');
                }
            } catch (e) {
                console.error("Error:", e);
                alert("伺服器連線失敗，請檢查網路或 GAS 部署設定。");
                showSection('loginSection');
            }
        });

        // 側邊欄邏輯
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        function toggle() { 
            sidebar.classList.toggle('-translate-x-full'); 
            overlay.classList.toggle('opacity-50'); 
            overlay.classList.toggle('pointer-events-none'); 
        }
        menuBtn.onclick = toggle; overlay.onclick = toggle;
    </script>
</body>
</html>
