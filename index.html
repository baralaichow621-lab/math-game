<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 側邊欄過渡動畫 */
        #sidebar {
            transition: transform 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <nav class="bg-blue-600 text-white p-4 flex items-center shadow-md">
        <button id="menuBtn" class="p-2 focus:outline-none hover:bg-blue-700 rounded-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>
        <h1 class="flex-1 text-center text-xl font-bold pr-10">數學遊戲</h1>
    </nav>

    <main class="flex-1 flex items-center justify-center p-6">
        <div class="text-center">
            <div class="text-64xl mb-4 text-blue-600">🧮</div>
            <p class="text-gray-600">歡迎來到數學挑戰世界！</p>
        </div>
    </main>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white shadow-2xl transform -translate-x-full z-50">
        <div class="p-6">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-bold text-gray-800">選單</h2>
                <button id="closeBtn" class="text-gray-500 hover:text-black">✕</button>
            </div>
            <ul class="space-y-4">
                <li>
                    <a href="ten.html" class="block p-3 bg-blue-50 text-blue-700 rounded-lg font-medium hover:bg-blue-100 transition">
                        🎮 合十
                    </a>
                </li>
                <li>
                    <a href="circle2.html" class="block p-3 bg-green-50 text-green-700 rounded-lg font-medium hover:bg-green-100 transition">
                        🧠 圓周魔王大戰
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black opacity-0 pointer-events-none transition-opacity duration-300 z-40"></div>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const closeBtn = document.getElementById('closeBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function toggleMenu() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('opacity-50');
            overlay.classList.toggle('pointer-events-none');
        }

        menuBtn.addEventListener('click', toggleMenu);
        closeBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);
    </script>

</body>
</html>
