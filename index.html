<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學合十挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #fff7ed; font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; touch-action: none; user-select: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: linear-gradient(to bottom, #fff7ed, #ffedd5); }
        
        .bubble { 
            position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: bold; cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,0.2); 
            border: 4px solid rgba(255,255,255,0.5); z-index: 10; transition: transform 0.1s; 
        }
        .bubble:active { transform: scale(0.9); }
        .bubble-wrong { background: #333 !important; animation: shake-fade 0.4s forwards; pointer-events: none; }
        
        @keyframes shake-fade {
            0% { transform: translateX(0); opacity: 1; }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            100% { transform: scale(0.5); opacity: 0; }
        }

        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 35px; box-shadow: 0 40px 80px rgba(0,0,0,0.3); text-align: center; z-index: 500; width: 92%; max-width: 420px; border: 6px solid #fed7aa; max-height: 90vh; overflow-y: auto; }
        #timer-bar { height: 100%; background: linear-gradient(90deg, #fb923c, #f97316); transition: width 0.1s linear; border-radius: 10px; }
        
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #f97316; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 龍虎榜樣式 */
        .rank-item { display: flex; align-items: center; padding: 10px 15px; margin-bottom: 8px; border-radius: 15px; background: #fffaf5; border: 1px solid #ffedd5; }
        .rank-num { width: 35px; font-weight: 900; font-style: italic; color: #fb923c; font-size: 1.2rem; }
        .rank-name { flex-grow: 1; text-align: left; font-weight: 700; color: #431407; }
        .rank-score { font-weight: 900; color: #ea580c; }
        .rank-1 { background: #fef3c7; border-color: #fcd34d; transform: scale(1.02); }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 進度條 -->
    <div class="absolute top-4 left-4 right-4 h-6 bg-black/10 z-[100] rounded-full p-1 border-2 border-white/50">
        <div id="timer-bar" style="width: 100%;"></div>
    </div>

    <!-- 登入介面 -->
    <div id="login-screen" class="absolute inset-0 bg-orange-500 flex flex-col items-center justify-center text-white z-[600] p-6 text-center">
        <div class="mb-6">
            <div class="text-7xl mb-2">🔥</div>
            <h1 class="text-4xl font-black italic">合十龍虎榜</h1>
            <p class="text-orange-100 font-bold tracking-widest text-sm">TOP 10 CHALLENGE</p>
        </div>
        
        <div class="bg-white p-6 rounded-[35px] shadow-2xl w-full max-w-sm text-gray-800">
            <div class="space-y-4">
                <input type="text" id="stu-id" placeholder="輸入學號" class="bg-orange-50 border-2 border-orange-100 p-3 rounded-2xl w-full text-center text-lg font-bold outline-none focus:border-orange-400">
                <input type="password" id="stu-pw" placeholder="密碼" class="bg-orange-50 border-2 border-orange-100 p-3 rounded-2xl w-full text-center text-lg font-bold outline-none focus:border-orange-400">
                <button id="login-btn" class="bg-orange-500 text-white py-4 rounded-2xl text-xl font-black w-full shadow-[0_4px_0_rgb(194,65,12)] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center">
                    <span id="btn-text">登入並挑戰</span>
                    <div id="btn-loader" class="loader hidden"></div>
                </button>
                <button id="guest-btn" class="text-gray-400 font-bold text-sm">訪客試玩 (不計分)</button>
            </div>
        </div>
    </div>

    <div id="bubble-area" class="absolute inset-0"></div>

    <div class="absolute top-12 left-0 right-0 flex flex-col items-center pointer-events-none z-50">
        <div id="score-tag" class="bg-white text-orange-600 px-6 py-2 rounded-full text-2xl font-black shadow-lg border-2 border-orange-400">得分: 0</div>
    </div>

    <!-- 龍虎榜結算畫面 -->
    <div id="message-box" class="modal hidden">
        <h2 class="text-2xl font-black text-gray-800 mb-2">挑戰結束！</h2>
        <div class="bg-orange-50 py-3 rounded-2xl mb-4">
            <p class="text-xs text-orange-400 font-bold uppercase">Your Score</p>
            <p class="text-5xl font-black text-orange-500" id="final-score">0</p>
        </div>

        <div class="mb-4">
            <h3 class="text-lg font-black text-orange-600 mb-2 flex items-center justify-center">
                <span class="mr-2">🏆</span> 全校龍虎榜 TOP 10
            </h3>
            <div id="leaderboard-list" class="space-y-1">
                <div class="text-gray-400 py-4 italic">讀取榜單中...</div>
            </div>
        </div>

        <button id="restart-btn" class="bg-orange-500 text-white py-4 rounded-2xl font-black text-xl w-full shadow-[0_4px_0_rgb(194,65,12)] active:translate-y-1 active:shadow-none mb-2">再玩一次</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxRYrYmNiYN-fnhjkXxvYeLXiYh9mre-8U9Vn65rSCqg1qFzCsvT91F0JdiOOXqIexg8w/exec";
    let score = 0;
    let gameActive = false;
    let currentTime = 20000;
    const MAX_TIME = 20000;
    let currentUserId = "";

    // 音效
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'correct') {
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'wrong') {
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    // 登入
    document.getElementById('login-btn').onclick = async () => {
        const id = document.getElementById('stu-id').value;
        const pw = document.getElementById('stu-pw').value;
        if(!id || !pw) return;
        document.getElementById('btn-text').classList.add('hidden');
        document.getElementById('btn-loader').classList.remove('hidden');
        try {
            const res = await fetch(`${SCRIPT_URL}?id=${encodeURIComponent(id)}&pw=${encodeURIComponent(pw)}&action=login`);
            const data = await res.json();
            if(data.status === "success") { currentUserId = id; startGameFlow(); }
            else { playSound('wrong'); alert("登入失敗！"); }
        } catch (e) { alert("系統繁忙中"); }
        finally {
            document.getElementById('btn-text').classList.remove('hidden');
            document.getElementById('btn-loader').classList.add('hidden');
        }
    };

    document.getElementById('guest-btn').onclick = () => { currentUserId = "GUEST"; startGameFlow(); };

    function startGameFlow() {
        document.getElementById('login-screen').classList.add('hidden');
        startGame();
    }

    function startGame() {
        score = 0; currentTime = MAX_TIME; gameActive = true;
        document.getElementById('score-tag').innerText = "得分: 0";
        document.getElementById('bubble-area').innerHTML = '';
        const timerInterval = setInterval(() => {
            if (!gameActive) { clearInterval(timerInterval); return; }
            currentTime -= 100;
            document.getElementById('timer-bar').style.width = (currentTime/MAX_TIME*100) + "%";
            if (currentTime <= 0) endGame();
        }, 100);
        spawnBubbles();
    }

    function spawnBubbles() {
        if (!gameActive) return;
        createBubble();
        setTimeout(spawnBubbles, Math.max(400, 800 - (score * 2)));
    }

    function createBubble() {
        const b = document.createElement('div');
        b.className = 'bubble';
        const isMatch = Math.random() < 0.5;
        const n1 = Math.floor(Math.random() * 11);
        let n2 = isMatch ? (10 - n1) : Math.floor(Math.random() * 11);
        if (!isMatch && (n1 + n2 === 10)) n2 = (n2 + 1) % 11;
        b.innerHTML = `<span class="text-3xl font-black italic">${n1}+${n2}</span>`;
        const size = 100;
        b.style.width = size + "px"; b.style.height = size + "px";
        b.style.left = Math.random() * (window.innerWidth - size) + "px";
        b.style.top = window.innerHeight + "px";
        b.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 50%)`;
        document.getElementById('bubble-area').appendChild(b);
        let pos = window.innerHeight;
        const move = setInterval(() => {
            if (!gameActive) { b.remove(); clearInterval(move); return; }
            pos -= (2 + score/200);
            b.style.top = pos + "px";
            if (pos < -size) { b.remove(); clearInterval(move); }
        }, 16);
        const hit = () => {
            if (!gameActive || b.classList.contains('bubble-wrong')) return;
            if (n1 + n2 === 10) {
                playSound('correct'); score += 10; currentTime = Math.min(MAX_TIME, currentTime + 1000);
                confetti({ particleCount: 20, spread: 50, origin: { x: b.offsetLeft/window.innerWidth, y: b.offsetTop/window.innerHeight }});
                b.remove(); document.getElementById('score-tag').innerText = "得分: " + score;
            } else {
                playSound('wrong'); currentTime -= 3000; b.classList.add('bubble-wrong');
            }
        };
        b.onmousedown = hit; b.ontouchstart = (e) => { e.preventDefault(); hit(); };
    }

    async function endGame() {
        gameActive = false;
        playSound('wrong');
        document.getElementById('final-score').innerText = score;
        document.getElementById('message-box').classList.remove('hidden');
        document.getElementById('leaderboard-list').innerHTML = '<div class="text-gray-400 py-4 italic">更新龍虎榜中...</div>';
        
        // 1. 上傳分數 (僅限非訪客)
        if (currentUserId !== "GUEST") {
            try {
                await fetch(`${SCRIPT_URL}?id=${encodeURIComponent(currentUserId)}&score=${score}&action=upload`);
            } catch(e) {}
        }
        
        // 2. 獲取龍虎榜
        fetchLeaderboard();
    }

    async function fetchLeaderboard() {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=get_leaderboard`);
            const data = await res.json(); // 假設回傳格式為 [{id: "S001", score: 500}, ...]
            displayLeaderboard(data);
        } catch(e) {
            document.getElementById('leaderboard-list').innerHTML = '<div class="text-red-400 py-4 italic">無法連線至榜單</div>';
        }
    }

    function displayLeaderboard(data) {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = '';
        if (!data || data.length === 0) {
            list.innerHTML = '<div class="text-gray-400 py-4 italic">尚無排名</div>';
            return;
        }
        data.slice(0, 10).forEach((item, index) => {
            const row = document.createElement('div');
            row.className = `rank-item ${index === 0 ? 'rank-1' : ''}`;
            const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : (index + 1);
            row.innerHTML = `
                <div class="rank-num">${medal}</div>
                <div class="rank-name">${item.id}</div>
                <div class="rank-score">${item.score}</div>
            `;
            list.appendChild(row);
        });
    }

    document.getElementById('restart-btn').onclick = () => {
        document.getElementById('message-box').classList.add('hidden');
        startGame();
    };
</script>

</body>
</html>
