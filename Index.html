<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小學生合十挑戰 (Google 登入版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #fff7ed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        .bubble {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            transition: transform 0.1s;
            user-select: none;
            border: 3px solid rgba(255,255,255,0.3);
        }
        .bubble:active { transform: scale(0.9); }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            padding: 0 20px;
            pointer-events: none;
            z-index: 10;
        }
        #score-board {
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-size: 1.2rem;
            font-weight: bold;
            color: #ea580c;
            display: inline-block;
            pointer-events: auto;
        }
        #timer-bar-container {
            width: 100%;
            height: 12px;
            background: #ffedd5;
            border-radius: 6px;
            margin-top: 15px;
            overflow: hidden;
            border: 1px solid #fed7aa;
        }
        #timer-bar {
            width: 100%;
            height: 100%;
            background: #f97316;
            transition: width 0.1s linear;
        }
        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center;
            z-index: 100;
            display: none;
            width: 90%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .confetti { position: absolute; pointer-events: none; }
        #loading-ai { display: none; margin-top: 10px; font-size: 0.9rem; color: #ea580c; }
        
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            margin: 4px 0;
            background: #fff7ed;
            border-radius: 12px;
            font-size: 0.9rem;
        }
        .rank-1 { background: #fef3c7; border: 1px solid #fbbf24; font-weight: bold; }
        .user-avatar { width: 24px; height: 24px; border-radius: 50%; margin-right: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div class="flex flex-col items-center">
            <div id="target-display" class="bg-orange-500 text-white px-6 py-2 rounded-2xl text-xl font-black shadow-lg mb-2 border-4 border-orange-200 pointer-events-auto">
                🎯 找出相加等於 <span class="text-yellow-300 text-3xl">10</span>
            </div>
            <div id="score-board">得分: 0</div>
        </div>
        <div id="timer-bar-container">
            <div id="timer-bar"></div>
        </div>
    </div>

    <!-- 初始開始畫面 -->
    <div id="start-screen" class="absolute inset-0 bg-orange-400 flex flex-col items-center justify-center text-white z-[200] p-6 text-center">
        <div class="text-6xl mb-4">⚡</div>
        <h1 class="text-4xl font-bold mb-2">10秒極速挑戰</h1>
        <p class="mb-6 text-lg">在 10 秒內挑戰最高分！</p>
        
        <div id="user-info" class="mb-6 hidden">
            <div class="flex items-center bg-orange-500 bg-opacity-50 px-4 py-2 rounded-full border border-orange-300">
                <img id="header-avatar" src="" class="user-avatar w-8 h-8">
                <span id="header-name" class="font-bold">載入中...</span>
            </div>
        </div>

        <button id="google-login-btn" class="bg-white text-gray-700 px-6 py-3 rounded-full font-bold shadow-lg mb-4 flex items-center hover:bg-gray-100 transition-colors">
            <svg class="w-5 h-5 mr-2" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></head></svg>
            使用 Google 登入參賽
        </button>

        <button id="start-btn" class="bg-white text-orange-500 px-10 py-4 rounded-full text-2xl font-bold shadow-xl active:scale-90 transition-transform hidden">
            開始遊戲
        </button>
    </div>

    <!-- 結算畫面 -->
    <div id="message-box">
        <h2 class="text-2xl font-bold mb-2 text-orange-600">時間到！</h2>
        <p class="text-md text-gray-600 mb-1">你的得分：<span id="final-score" class="text-3xl font-black text-orange-500">0</span></p>
        
        <div id="ai-feedback-container" class="bg-orange-50 p-3 rounded-xl mb-4 border border-orange-100">
            <p id="ai-text" class="italic text-orange-800 text-sm">正在請 Gemini 老師評分...</p>
            <div id="loading-ai" class="animate-pulse">✨ AI 正在思考...</div>
            <button id="speak-btn" class="mt-2 bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs font-bold hidden">
                🔊 聽聽老師的話
            </button>
        </div>

        <div class="mb-4">
            <h3 class="text-lg font-bold text-gray-700 mb-2">🏆 Google 龍虎榜</h3>
            <div id="leaderboard-list" class="text-left">
                <p class="text-center text-gray-400 text-sm italic">正在同步排名...</p>
            </div>
        </div>

        <button id="restart-btn" class="bg-orange-500 text-white px-8 py-3 rounded-full text-xl font-bold shadow-lg w-full">再挑戰一次</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- Firebase 初始化 ---
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'math-adventure-google';
    const apiKey = ""; 

    let currentUser = null;

    // UI 元素
    const container = document.getElementById('game-container');
    const scoreDisplay = document.getElementById('score-board');
    const timerBar = document.getElementById('timer-bar');
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    const loginBtn = document.getElementById('google-login-btn');
    const userInfo = document.getElementById('user-info');
    const headerAvatar = document.getElementById('header-avatar');
    const headerName = document.getElementById('header-name');
    const messageBox = document.getElementById('message-box');
    const restartBtn = document.getElementById('restart-btn');
    const aiText = document.getElementById('ai-text');
    const loadingAi = document.getElementById('loading-ai');
    const speakBtn = document.getElementById('speak-btn');
    const leaderboardList = document.getElementById('leaderboard-list');

    // 登入邏輯
    loginBtn.onclick = async () => {
        const provider = new GoogleAuthProvider();
        try {
            await signInWithPopup(auth, provider);
        } catch (error) {
            console.error("Login failed", error);
            // 失敗時使用匿名登入
            await signInAnonymously(auth);
        }
    };

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
            loginBtn.classList.add('hidden');
            startBtn.classList.remove('hidden');
            userInfo.classList.remove('hidden');
            headerName.innerText = user.displayName || "匿名冒險者";
            headerAvatar.src = user.photoURL || "https://www.gravatar.com/avatar/0?d=mp";
        }
    });

    // --- 龍虎榜邏輯 ---
    async function updateLeaderboard(finalScore) {
        if (!currentUser) return;
        
        try {
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'leaderboard', currentUser.uid);
            await setDoc(userRef, { 
                score: finalScore, 
                timestamp: Date.now(), 
                userId: currentUser.uid,
                name: currentUser.displayName || "匿名",
                photo: currentUser.photoURL || ""
            }, { merge: true });

            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
            const querySnapshot = await getDocs(colRef);
            
            let players = [];
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                if (data && typeof data.score === 'number') players.push(data);
            });

            players.sort((a, b) => b.score - a.score);
            const topPlayers = players.slice(0, 5);

            leaderboardList.innerHTML = topPlayers.map((p, i) => `
                <div class="leaderboard-item ${i === 0 ? 'rank-1' : ''} ${p.userId === currentUser.uid ? 'border-l-4 border-orange-500' : ''}">
                    <div class="flex items-center truncate">
                        <span class="mr-2 font-bold">${i + 1}.</span>
                        <img src="${p.photo || 'https://www.gravatar.com/avatar/0?d=mp'}" class="user-avatar">
                        <span class="truncate">${p.name}</span>
                    </div>
                    <span class="font-bold flex-shrink-0">${p.score} 分</span>
                </div>
            `).join('');
        } catch (e) {
            leaderboardList.innerHTML = `<p class='text-center text-red-400 text-xs'>排名載入失敗</p>`;
        }
    }

    // --- Gemini AI ---
    async function getGeminiFeedback(finalScore) {
        aiText.innerText = "";
        loadingAi.style.display = "block";
        speakBtn.style.display = "none";
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `玩家 ${currentUser.displayName} 在10秒內拿了 ${finalScore} 分，請熱血地鼓勵他！(15字內)` }] }],
                    systemInstruction: { parts: [{ text: "你是一位充滿活力的體育老師。" }] }
                })
            });
            const data = await response.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "爆發力十足！";
            aiText.innerText = "⚡ 老師評價：" + text;
            loadingAi.style.display = "none";
            speakBtn.style.display = "inline-block";
            speakBtn.onclick = () => playTts(text);
        } catch (error) {
            loadingAi.style.display = "none";
        }
    }

    async function playTts(text) {
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "gemini-2.5-flash-preview-tts",
                    contents: [{ parts: [{ text: `Say excitedly: ${text}` }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                    }
                })
            });
            const data = await response.json();
            const pcmBase64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
            if (pcmBase64) {
                const audioBlob = pcmToWav(pcmBase64, 24000);
                new Audio(URL.createObjectURL(audioBlob)).play();
            }
        } catch (e) {}
    }

    function pcmToWav(base64, sampleRate) {
        const pcmData = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
        const wavHeader = new ArrayBuffer(44);
        const view = new DataView(wavHeader);
        view.setUint32(0, 0x52494646, false); view.setUint32(4, 36 + pcmData.length, true);
        view.setUint32(8, 0x57415645, false); view.setUint32(12, 0x666d7420, false);
        view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true); view.setUint16(34, 16, true); view.setUint32(36, 0x64617461, false);
        view.setUint32(40, pcmData.length, true);
        return new Blob([wavHeader, pcmData], { type: 'audio/wav' });
    }

    // --- 遊戲邏輯 ---
    let score = 0, timeLeft = 100, timerInterval, spawnInterval, bubbles = [];
    const colors = ['#f87171', '#60a5fa', '#4ade80', '#fbbf24', '#a78bfa', '#f472b6', '#2dd4bf'];
    let gameActive = false;

    function initGame() {
        score = 0; timeLeft = 100; scoreDisplay.innerText = "得分: 0";
        startScreen.style.display = 'none'; messageBox.style.display = 'none';
        gameActive = true; bubbles.forEach(b => b.remove()); bubbles = [];
        
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!gameActive) return;
            timeLeft -= 1; 
            timerBar.style.width = timeLeft + '%';
            if (timeLeft <= 0) endGame();
        }, 100);

        if (spawnInterval) clearInterval(spawnInterval);
        spawnInterval = setInterval(() => { if (gameActive && bubbles.length < 10) createBubble(); }, 600);
        for(let i=0; i<6; i++) createBubble();
    }

    function createBubble() {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        const isCorrect = Math.random() > 0.4;
        let a = Math.floor(Math.random() * 11);
        let content = isCorrect ? `${a} + ${10 - a}` : `${a} + ${Math.floor(Math.random()*10)}`;
        if (!isCorrect && parseInt(content.split('+')[0])+parseInt(content.split('+')[1]) === 10) content = `${a} + 1`;
        
        bubble.innerText = content;
        const size = Math.min(window.innerWidth * 0.22, 100);
        bubble.style.width = size + 'px'; bubble.style.height = size + 'px';
        bubble.style.fontSize = (size * 0.28) + 'px';
        bubble.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        bubble.style.left = (Math.random() * (window.innerWidth - size)) + 'px';
        bubble.style.top = (window.innerHeight + 100) + 'px';
        
        let speed = 2.0 + Math.random() * 2.0;
        let floatPos = window.innerHeight + 100;
        container.appendChild(bubble);
        bubbles.push(bubble);
        
        const moveInterval = setInterval(() => {
            if (!gameActive) { clearInterval(moveInterval); return; }
            floatPos -= speed; bubble.style.top = floatPos + 'px';
            if (floatPos < -150) { bubble.remove(); bubbles = bubbles.filter(b => b !== bubble); clearInterval(moveInterval); }
        }, 16);
        bubble.onmousedown = (e) => handlePop(bubble, content);
        bubble.ontouchstart = (e) => { e.preventDefault(); handlePop(bubble, content); };
    }

    function handlePop(el, content) {
        if (!gameActive) return;
        const sum = content.split('+').reduce((a, b) => parseInt(a) + parseInt(b), 0);
        if (sum === 10) {
            score += 10; timeLeft = Math.min(100, timeLeft + 8); 
            createConfetti(el.offsetLeft + el.offsetWidth/2, el.offsetTop + el.offsetHeight/2, el.style.backgroundColor);
            el.remove(); bubbles = bubbles.filter(b => b !== el);
        } else {
            score = Math.max(0, score - 5); timeLeft = Math.max(0, timeLeft - 5);
            el.style.transform = 'scale(0.8)'; setTimeout(() => el.style.transform = 'scale(1)', 200);
        }
        scoreDisplay.innerText = `得分: ${score}`;
    }

    function createConfetti(x, y, color) {
        for (let i = 0; i < 8; i++) {
            const c = document.createElement('div');
            c.className = 'confetti'; c.style.width = '8px'; c.style.height = '8px';
            c.style.backgroundColor = color; c.style.left = x + 'px'; c.style.top = y + 'px';
            container.appendChild(c);
            const angle = Math.random() * Math.PI * 2;
            c.animate([{ opacity: 1 }, { transform: `translate(${Math.cos(angle)*60}px, ${Math.sin(angle)*60}px)`, opacity: 0 }], 500).onfinish = () => c.remove();
        }
    }

    function endGame() {
        gameActive = false;
        clearInterval(timerInterval); clearInterval(spawnInterval);
        document.getElementById('final-score').innerText = score;
        messageBox.style.display = 'block';
        getGeminiFeedback(score);
        updateLeaderboard(score);
    }

    startBtn.onclick = initGame;
    restartBtn.onclick = initGame;
</script>
</body>
</html>
